name: Windows build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: win64_msvc2022_64

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Deploy Qt runtime
        run: |
          mkdir dist
          copy build\Release\ExpenseBook.exe dist\
          windeployqt --release --no-translations dist\ExpenseBook.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ExpenseBook-windows-x64
          path: dist/
